<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 大模型价格对比 - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .price-up { color: #ef4444; }
        .price-down { color: #22c55e; }
        .provider-openai { border-left: 4px solid #10a37f; }
        .provider-anthropic { border-left: 4px solid #d97706; }
        .provider-google { border-left: 4px solid #4285f4; }
        .provider-deepseek { border-left: 4px solid #6b21a8; }
        .provider-cursor { border-left: 4px solid #10b981; }
        .provider-claude-code { border-left: 4px solid #d97706; }
        .provider-cline { border-left: 4px solid #8b5cf6; }
        @media (max-width: 768px) {
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">🤖 AI 大模型价格对比</h1>
            <p class="text-gray-600">实时对比主流 AI 模型的输入输出价格与 Coding Plan 收费</p>
            <p class="text-sm text-gray-500 mt-2">最后更新：<span id="lastUpdate">加载中...</span></p>
        </header>

        <!-- AI Models Table -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <span class="mr-2">📊</span> AI 大模型价格对比
                <span class="text-sm font-normal text-gray-500 ml-2">(每百万 Token，USD)</span>
            </h2>
            
            <div class="mb-4">
                <input type="text" id="modelSearch" placeholder="搜索模型..." 
                    class="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="table-container bg-white rounded-xl shadow-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="provider">厂商</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="model">模型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="inputPrice">输入价格</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="outputPrice">输出价格</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="contextWindow">上下文</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                        </tr>
                    </thead>
                    <tbody id="aiModelsBody" class="bg-white divide-y divide-gray-200">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Coding Plans Table -->
        <section>
            <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                <span class="mr-2">💼</span> Coding Plan 价格对比
                <span class="text-sm font-normal text-gray-500 ml-2">(月费，USD)</span>
            </h2>

            <div class="mb-4">
                <input type="text" id="planSearch" placeholder="搜索套餐..." 
                    class="w-full md:w-64 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div class="table-container bg-white rounded-xl shadow-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="provider">厂商</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="plan">套餐</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" data-sort="price">价格</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">计费方式</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">特色功能</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">限制</th>
                        </tr>
                    </thead>
                    <tbody id="codingPlansBody" class="bg-white divide-y divide-gray-200">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>数据来源：各厂商官方定价页面 | 价格可能随时变动，请以官网为准</p>
            <p class="mt-2">每日北京时间 3:00 自动更新</p>
        </footer>
    </div>

    <script src="data.js"></script>
</body>
</html>
